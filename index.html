<!DOCTYPE html>
<html>
<head>
  <title>AI Translator</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    select, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🌍 AI Translator</h1>

    <textarea id="inputText" placeholder="Type something..."></textarea>

    <select id="targetLang">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="pt">Portuguese</option>
    </select>

    <br>
    <button onclick="translateText()">Translate</button>
    <button onclick="speakText()">🔊 Speak</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
