<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Translator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; text-align: center; padding: 50px; }
    input, select { padding: 10px; margin: 5px; font-size: 16px; width: 300px; }
    button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 20px; min-height: 40px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
  </style>
</head>
<body>
  <h1>🌍 Live Translator</h1>
  <input type="text" id="inputText" placeholder="Type something..." autofocus>
  <select id="targetLang">
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="fr">French</option>
    <option value="pt">Portuguese</option>
  </select>
  <div>
    <div class="controls">
  <button id="translateBtn">Translate</button>
  <select id="voiceSelect"></select>
  <button id="speakBtn">🔊 Speak</button>
</div>

<div class="speed-control">
  <label for="speedRange">Speed:</label>
  <input type="range" id="speedRange" min="0.5" max="1.5" value="1" step="0.1">
  <span id="speedValue">1</span>
</div>
  </div>
  <div id="result"></div>
  <script src="script.js"></script>
</body>
</html>
