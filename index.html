<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="JvosdEjmgI5zPGVOyi19a5BjDhQ9VlkLu3GMyLQnfIg" />
<meta charset="UTF-8">

<!-- Mobile responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Translator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #333;
    text-align: center;
    padding: 20px;
    max-width: 500px;
    margin: auto;
  }

  h1 {
    font-size: 24px;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    font-size: 18px;
    border-radius: 8px;
  }

  button {
    cursor: pointer;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .speed-control {
    margin-top: 10px;
  }

  #result {
    margin-top: 20px;
    font-size: 22px;
    min-height: 40px;
    background: #fff;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
</style>
</head>

<body>

  <h1>🌍 Live Translator</h1>

  <input type="text" id="inputText" placeholder="Type something..." autofocus>

  <select id="targetLang">
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="fr">French</option>
    <option value="pt">Portuguese</option>
  </select>

  <div class="controls">
    <button id="translateBtn">Translate</button>
    <select id="voiceSelect"></select>
    <button id="speakBtn">🔊 Speak</button>
  </div>

  

  <div id="result"></div>

  <script src="script.js"></script>

</body>
</html>
