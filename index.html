<!DOCTYPE html>
<html>
<head>
  <title>TranslateNowAI</title>
</head>
<body>
  <h1>TranslateNowAI</h1>

  <textarea id="text" placeholder="Type text here"></textarea><br><br>

  <select id="language">
    <option value="Spanish">Spanish</option>
    <option value="French">French</option>
    <option value="German">German</option>
  </select>

  <br><br>
  <button id="translateBtn">Translate</button>

  <h3 id="result"></h3>

  <script>
    document.getElementById("translateBtn").addEventListener("click", async function () {
      const text = document.getElementById("text").value;
      const targetLang = document.getElementById("language").value;

      if (!text) {
        alert("Please type something");
        return;
      }

      document.getElementById("result").innerText = "Translating...";

      try {
        const res = await fetch("/api/translate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: text,
            targetLang: targetLang
          })
        });

        const data = await res.json();

        if (data.translation) {
          document.getElementById("result").innerText = data.translation;
        } else {
          document.getElementById("result").innerText = "Error translating";
        }

      } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "Error connecting to server";
      }
    });
  </script>
</body>
</html>
